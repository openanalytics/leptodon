apiVersion: v1
kind: Pod
metadata:
  labels:
    ci: leptodon-build
spec:
  volumes:
    - name: dockerconfig
      secret:
        secretName: oa-sa-jenkins-registry-config
  containers:
    - name: kaniko
      image: gcr.io/kaniko-project/executor:v1.23.1-debug
      resources:
        limits:
          memory: "16Gi"
          ephemeral-storage: "30Gi"
        requests:
          memory: "14Gi"
          cpu: 1
          ephemeral-storage: "30Gi"
      imagePullPolicy: Always
    - name: leptodon-build
      image: registry.openanalytics.eu/proxy/nixpkgs/nix-flakes:nixos-25.11-x86_64-linux
      resources:
        limits:
          memory: "12Gi"
          ephemeral-storage: "30Gi"
          cpu: 7
        requests:
          memory: "8Gi"
          ephemeral-storage: "30Gi"
          cpu: 1
      tty: true
      securityContext:
        privileged: true
      volumeMounts:
        - name: dockerconfig
          mountPath: /root/.docker/config.json
          subPath: data
      env:
        - name: COMPOSE_HTTP_TIMEOUT
          value: 600
      imagePullPolicy: Always
